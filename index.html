<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Sugerencias - Registro Dual</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: #f4f6f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .form-card {
            border: none;
            border-radius: 16px;
            max-width: 500px;
            width: 100%;
        }
        .header-gradient {
            background: linear-gradient(135deg, #0d6efd, #198754);
            color: white;
            border-radius: 16px 16px 0 0;
            padding: 2rem;
            text-align: center;
        }
        .input-group-text {
            background-color: #f8f9fa;
            border-right: none;
        }
        .form-control {
            border-left: none;
        }
        .form-control:focus {
            border-color: #dee2e6;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="container p-3 d-flex justify-content-center">
        <div class="card form-card shadow-lg animate__animated animate__fadeIn">
            
            <div class="header-gradient">
                <h3 class="mb-1 fw-bold"><i class="bi bi-journal-plus me-2"></i>Buzón de Sugerencias</h3>
                <p class="mb-0 opacity-75 small">Persistencia simultánea en PostgreSQL y MongoDB Atlas</p>
            </div>

            <div class="card-body p-4">
                <form action="controlador/logica.php" method="post">
                    
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary">Nombre completo</label>
                        <div class="input-group">
                            <span class="input-group-text text-muted"><i class="bi bi-person-fill"></i></span>
                            <input type="text" name="nom" required class="form-control" placeholder="Ej. Santiago Pérez" autocomplete="off">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary">Teléfono de contacto</label>
                        <div class="input-group">
                            <span class="input-group-text text-muted"><i class="bi bi-telephone-fill"></i></span>
                            <input type="number" name="tel" required min="3000000000" max="4000000000" class="form-control" placeholder="Mínimo 3000000000">
                        </div>
                        <div class="form-text text-muted small">Debe ser un número celular válido de 10 dígitos.</div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary">Detalles de la sugerencia</label>
                        <div class="input-group">
                            <span class="input-group-text text-muted"><i class="bi bi-chat-left-text-fill"></i></span>
                            <input type="text" name="det" required class="form-control" placeholder="Escribe tu propuesta o comentario aquí...">
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" id="boton" class="btn btn-primary btn-lg fw-bold shadow-sm">
                            <i class="bi bi-send-fill me-2"></i> Enviar a Base de Datos
                        </button>
                    </div>

                </form>
            </div>
            
            <div class="card-footer bg-white text-center py-3 border-0 rounded-bottom">
                <span class="text-muted small"><i class="bi bi-shield-check text-success"></i> Entorno de producción seguro</span>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
